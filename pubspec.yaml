name: hvt_edusuite_mobile
description: A new Flutter project for HVT EduSuite Mobile App (Parents and Teachers).
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^12.1.3

  # Network HTTP
  dio: ^5.4.0

  # Local Storage & Security
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8 # Fingerprint / Face ID support

  # Notifications
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.20.2
  fluttertoast: ^9.1.0
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5
  flutter_markdown: ^0.7.7+1
  cached_network_image: ^3.4.1
  
  # Gemini Live Streaming
  web_socket_channel: ^3.0.1
  record: ^7.1.0
  lottie: ^3.1.2
  flutter_sound: ^9.17.8
  # Wake Word
  audioplayers: ^6.8.0
  permission_handler: ^12.0.3
  audio_session: ^0.2.3
  path_provider: ^2.1.6
  vosk_flutter_service: ^0.1.2
  archive: ^4.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/appicon.png
    - assets/linhthu.png
    - assets/Resources/
    - assets/models/vosk-model-small-en-us.zip
    - assets/models/vosk-model-small-vn.zip
    - assets/models/vosk-model-en.zip

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/appicon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/appicon.png"
    background_color: "#ffffff"
    theme_color: "#6C63FF"
  windows:
    generate: true
    image_path: "assets/appicon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/appicon.png"

dependency_overrides:
  http: ^1.2.2
  permission_handler: ^12.0.3
  permission_handler_android: ^13.0.1

